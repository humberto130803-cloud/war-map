<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World War Map — Live Conflict Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        .header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 70%, transparent 100%);
            padding: 16px 24px 32px;
            pointer-events: none;
        }
        .header-overlay h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            pointer-events: auto;
        }
        .header-overlay .subtitle {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .header-overlay .last-updated {
            font-size: 11px;
            color: #555;
            margin-top: 2px;
        }

        /* Legend */
        .legend {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 1000;
            background: rgba(15,15,22,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 18px;
            backdrop-filter: blur(12px);
        }
        .legend h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* Stats panel */
        .stats-panel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(15,15,22,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 18px;
            backdrop-filter: blur(12px);
            min-width: 200px;
        }
        .stats-panel h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 10px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .stat-count {
            font-weight: 700;
            font-size: 16px;
        }

        /* Country popup */
        .leaflet-popup-content-wrapper {
            background: rgba(15,15,22,0.96) !important;
            color: #e0e0e0 !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            border-radius: 10px !important;
            backdrop-filter: blur(12px);
            max-width: 400px !important;
        }
        .leaflet-popup-content {
            margin: 14px 16px !important;
            font-family: 'Segoe UI', system-ui, sans-serif !important;
            max-height: 400px;
            overflow-y: auto;
        }
        .leaflet-popup-tip {
            background: rgba(15,15,22,0.96) !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
        }
        .leaflet-popup-close-button {
            color: #888 !important;
            font-size: 18px !important;
        }
        .popup-country-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .popup-status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .popup-conflict {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .popup-conflict-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-conflict-role {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
        }
        .popup-conflict-desc {
            font-size: 12px;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 8px;
        }
        .popup-source {
            display: block;
            font-size: 11px;
            color: #6b9fff;
            text-decoration: none;
            margin-bottom: 3px;
            word-break: break-word;
        }
        .popup-source:hover {
            color: #93b8ff;
            text-decoration: underline;
        }
        .popup-peaceful {
            text-align: center;
            padding: 20px 0;
            color: #6b9fff;
            font-size: 14px;
        }

        /* Scrollbar */
        .leaflet-popup-content::-webkit-scrollbar {
            width: 5px;
        }
        .leaflet-popup-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .leaflet-popup-content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        /* Search */
        .search-box {
            position: fixed;
            top: 16px;
            right: 24px;
            z-index: 1000;
        }
        .search-box input {
            background: rgba(15,15,22,0.92);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 8px 14px;
            color: #e0e0e0;
            font-size: 14px;
            width: 240px;
            outline: none;
            backdrop-filter: blur(12px);
        }
        .search-box input:focus {
            border-color: rgba(107,159,255,0.5);
        }
        .search-box input::placeholder {
            color: #555;
        }
        .search-results {
            background: rgba(15,15,22,0.96);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            margin-top: 4px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .search-result-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-result-item:hover {
            background: rgba(255,255,255,0.05);
        }
        .search-result-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Filter buttons */
        .filter-bar {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            background: rgba(15,15,22,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 6px 10px;
            backdrop-filter: blur(12px);
        }
        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #aaa;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background: rgba(255,255,255,0.08);
        }
        .filter-btn.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="header-overlay">
        <h1>WORLD WAR MAP</h1>
        <div class="subtitle">Global Conflict Tracker — Interactive Map</div>
        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search country..." autocomplete="off" />
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="declared_war">Declared War</button>
        <button class="filter-btn" data-filter="active_conflict">Active Conflict</button>
        <button class="filter-btn" data-filter="proxy_involvement">Proxy</button>
        <button class="filter-btn" data-filter="tensions">Tensions</button>
        <button class="filter-btn" data-filter="peaceful">Peaceful</button>
    </div>

    <div id="map"></div>

    <div class="legend">
        <h3>Status</h3>
        <div class="legend-item"><div class="legend-color" style="background:#DC2626"></div> Officially Declared War</div>
        <div class="legend-item"><div class="legend-color" style="background:#EA580C"></div> Active Armed Conflict</div>
        <div class="legend-item"><div class="legend-color" style="background:#EAB308"></div> Proxy / Indirect Involvement</div>
        <div class="legend-item"><div class="legend-color" style="background:#FDE68A"></div> Tensions / Disputes</div>
        <div class="legend-item"><div class="legend-color" style="background:#2563EB"></div> Peaceful</div>
        <div class="legend-item"><div class="legend-color" style="background:#1a1a2e"></div> No Data</div>
    </div>

    <div class="stats-panel">
        <h3>Conflict Stats</h3>
        <div id="statsContent"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script id="conflict-data" type="application/json">CONFLICT_DATA_PLACEHOLDER</script>
    <script>
    (async function() {
        // Initialize map
        const map = L.map('map', {
            center: [20, 10],
            zoom: 3,
            minZoom: 2,
            maxZoom: 7,
            zoomControl: false,
            attributionControl: false,
            worldCopyJump: true
        });

        L.control.zoom({ position: 'topright' }).addTo(map);

        // Dark tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Load conflict data - try fetch first (GitHub Pages), fall back to embedded
        let conflictData;
        try {
            const embedded = document.getElementById('conflict-data').textContent;
            if (embedded && !embedded.includes('PLACEHOLDER')) {
                conflictData = JSON.parse(embedded);
            } else {
                const resp = await fetch('conflict_data.json');
                conflictData = await resp.json();
            }
        } catch(e) {
            try {
                const resp = await fetch('conflict_data.json');
                conflictData = await resp.json();
            } catch(e2) {
                console.error('Failed to load conflict data:', e2);
                return;
            }
        }

        document.getElementById('lastUpdated').textContent = `Last updated: ${conflictData.last_updated}`;

        // ISO Alpha-3 to Alpha-2 mapping for matching GeoJSON (which uses Alpha-3)
        // GeoJSON from Natural Earth uses ISO_A3 property
        const colors = {
            declared_war: '#DC2626',
            active_conflict: '#EA580C',
            proxy_involvement: '#EAB308',
            tensions: '#FDE68A',
            peaceful: '#2563EB'
        };

        const defaultColor = '#1a1a2e';
        const defaultBorder = '#2a2a3e';

        // Country name to ISO code mapping for GeoJSON matching
        const nameToIso = {};
        const isoToData = {};
        for (const [code, data] of Object.entries(conflictData.countries)) {
            isoToData[code] = data;
            nameToIso[data.name.toLowerCase()] = code;
        }

        function getCountryData(feature) {
            const props = feature.properties;
            // Try multiple GeoJSON property names
            const iso3 = props.ISO_A3 || props.iso_a3 || props.ISO_A3_EH || props.ADM0_A3;
            if (iso3 && isoToData[iso3]) return isoToData[iso3];

            // Fallback: match by name
            const name = (props.NAME || props.name || props.ADMIN || '').toLowerCase();
            const code = nameToIso[name];
            if (code) return isoToData[code];

            return null;
        }

        function getStyle(feature) {
            const data = getCountryData(feature);
            const status = data ? data.status : null;
            const color = status ? colors[status] : defaultColor;

            return {
                fillColor: color,
                weight: 1,
                opacity: 0.8,
                color: status ? shadeColor(color, -30) : defaultBorder,
                fillOpacity: status ? 0.6 : 0.3
            };
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function buildPopup(data, featureName) {
            if (!data) {
                return `<div class="popup-country-name">${featureName || 'Unknown'}</div>
                         <div class="popup-peaceful">No conflict data available</div>`;
            }

            const statusLabels = {
                declared_war: 'Declared War',
                active_conflict: 'Active Conflict',
                proxy_involvement: 'Proxy Involvement',
                tensions: 'Tensions',
                peaceful: 'Peaceful'
            };

            let html = `<div class="popup-country-name">${data.name}</div>`;
            html += `<div class="popup-status" style="background:${colors[data.status]}33; color:${colors[data.status]}; border:1px solid ${colors[data.status]}55">${statusLabels[data.status]}</div>`;

            if (data.conflicts.length === 0) {
                html += `<div class="popup-peaceful">This country is not currently involved in any known armed conflicts.</div>`;
            } else {
                for (const conflict of data.conflicts) {
                    html += `<div class="popup-conflict">`;
                    html += `<div class="popup-conflict-name">${conflict.name}</div>`;
                    html += `<div class="popup-conflict-role">${conflict.role}</div>`;
                    html += `<div class="popup-conflict-desc">${conflict.description}</div>`;
                    if (conflict.sources) {
                        for (const src of conflict.sources) {
                            html += `<a class="popup-source" href="${src.url}" target="_blank" rel="noopener">${src.title}</a>`;
                        }
                    }
                    html += `</div>`;
                }
            }

            return html;
        }

        let geojsonLayer;
        let currentFilter = 'all';

        function filterStyle(feature) {
            const data = getCountryData(feature);
            const status = data ? data.status : null;

            if (currentFilter !== 'all' && status !== currentFilter) {
                return {
                    fillColor: defaultColor,
                    weight: 0.5,
                    opacity: 0.3,
                    color: defaultBorder,
                    fillOpacity: 0.15
                };
            }

            return getStyle(feature);
        }

        // Load GeoJSON
        try {
            const geoResp = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
            const geoData = await geoResp.json();

            geojsonLayer = L.geoJSON(geoData, {
                style: getStyle,
                onEachFeature: function(feature, layer) {
                    const data = getCountryData(feature);
                    const name = feature.properties.ADMIN || feature.properties.NAME || feature.properties.name || 'Unknown';

                    layer.on({
                        mouseover: function(e) {
                            const l = e.target;
                            l.setStyle({ weight: 2, opacity: 1, fillOpacity: 0.8 });
                            l.bringToFront();
                        },
                        mouseout: function(e) {
                            geojsonLayer.resetStyle(e.target);
                        },
                        click: function(e) {
                            const popup = L.popup({ maxWidth: 380, maxHeight: 420 })
                                .setLatLng(e.latlng)
                                .setContent(buildPopup(data, name))
                                .openOn(map);
                        }
                    });
                }
            }).addTo(map);

            // Compute stats
            updateStats();

        } catch(e) {
            console.error('Failed to load GeoJSON:', e);
        }

        function updateStats() {
            const counts = { declared_war: 0, active_conflict: 0, proxy_involvement: 0, tensions: 0, peaceful: 0 };
            for (const data of Object.values(conflictData.countries)) {
                counts[data.status]++;
            }
            const labels = {
                declared_war: { label: 'Declared War', color: '#DC2626' },
                active_conflict: { label: 'Active Conflict', color: '#EA580C' },
                proxy_involvement: { label: 'Proxy/Indirect', color: '#EAB308' },
                tensions: { label: 'Tensions', color: '#FDE68A' },
                peaceful: { label: 'Peaceful', color: '#2563EB' }
            };
            let html = '';
            for (const [key, info] of Object.entries(labels)) {
                html += `<div class="stat-row">
                    <span style="color:${info.color}">${info.label}</span>
                    <span class="stat-count" style="color:${info.color}">${counts[key]}</span>
                </div>`;
            }
            document.getElementById('statsContent').innerHTML = html;
        }

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = [];
            for (const [code, data] of Object.entries(conflictData.countries)) {
                if (data.name.toLowerCase().includes(query)) {
                    matches.push({ code, data });
                }
            }

            if (matches.length === 0) {
                searchResults.style.display = 'none';
                return;
            }

            searchResults.style.display = 'block';
            searchResults.innerHTML = matches.slice(0, 10).map(m =>
                `<div class="search-result-item" data-code="${m.code}">
                    <div class="search-result-dot" style="background:${colors[m.data.status]}"></div>
                    ${m.data.name}
                </div>`
            ).join('');

            searchResults.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', function() {
                    const code = this.dataset.code;
                    // Find the country in the geojson layer and zoom to it
                    geojsonLayer.eachLayer(layer => {
                        const d = getCountryData(layer.feature);
                        if (d && Object.keys(conflictData.countries).find(k =>
                            conflictData.countries[k] === d) === code) {
                            map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                            const name = layer.feature.properties.ADMIN || layer.feature.properties.NAME || '';
                            L.popup({ maxWidth: 380, maxHeight: 420 })
                                .setLatLng(layer.getBounds().getCenter())
                                .setContent(buildPopup(d, name))
                                .openOn(map);
                        }
                    });
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                searchResults.style.display = 'none';
            }
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                geojsonLayer.setStyle(filterStyle);
            });
        });

    })();
    </script>
</body>
</html>
